# eviStream Redis Configuration
# Deploy to: /etc/redis/redis.conf (or use as override)
#
# For demo deployment — minimal config, single instance

# Network
bind 127.0.0.1
port 6380
protected-mode yes

# General
daemonize yes
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile /var/log/redis/redis-server.log

# Memory
maxmemory 2gb
maxmemory-policy allkeys-lru

# Persistence (minimal for demo)
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /var/lib/redis

# Connections
maxclients 256
timeout 300
tcp-keepalive 60
