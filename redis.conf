# Memory cap — prevents Redis from using all system memory
maxmemory 4gb
maxmemory-policy allkeys-lru

# Disable RDB snapshots (they caused the Feb 20 crash)
save ""

# Enable AOF for persistence
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Misc
bind 127.0.0.1
port 6380
